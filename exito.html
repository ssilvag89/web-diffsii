<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FD3H1EKJ0K"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FD3H1EKJ0K');
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! - DiffSii</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-dark);
        }

        .success-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">
                <i data-lucide="check" style="width: 40px; height: 40px;"></i>
            </div>
            <div class="status-badge">Pago Confirmado</div>
            <h1 style="font-size: 2.5rem; margin-bottom: 15px;">¡Gracias por tu compra!</h1>
            <p id="status-text" style="color: var(--text-muted); margin-bottom: 30px;">
                <span class="loader"></span> Configurando tu sistema DiffSii...
            </p>

            <div id="api-response" style="display: none;">
                <p style="color: #10b981; font-weight: 600; margin-bottom: 20px;">
                    ✅ Tu instancia ha sido creada con éxito.
                </p>
                <a href="https://saas.diffsii.cl/" id="btn-dashboard" class="btn btn-primary" style="display: block; width: 100%;">Iniciar
                    Sessión</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function registerSystem() {
            const urlParams = new URLSearchParams(window.location.search);    
            let userData = JSON.parse(localStorage.getItem('pending_registration'));
            
            // FALLBACK CRÍTICO: Si el Storage está vacío (Cruce de dominios localhost vs VPS)
            if (!userData && urlParams.get('email') && urlParams.get('rut')) {
                console.log("LocalStorage vacío. Reconstruyendo identidad desde URL...");
                userData = {
                    name: urlParams.get('name'),
                    email: urlParams.get('email'),
                    company: urlParams.get('company'),
                    rut: urlParams.get('rut'),
                    address: urlParams.get('address'),
                    commune: urlParams.get('commune'),
                    city: urlParams.get('city'),
                    plan: urlParams.get('plan'),
                    amount: urlParams.get('amount')
                };
            }

            const statusText = document.getElementById('status-text');
            const apiResponse = document.getElementById('api-response');

            if (!userData || !userData.email) {
                statusText.innerHTML = "No se encontraron datos de registro en la URL ni en LocalStorage. Por favor, contacta a soporte.";
                return;
            }

            try {
                // 2. Consumir API de creación de sistema (usando variable de entorno centralizada con fallback seguro)
                const apiUrl = (window.ENV && window.ENV.API_REGISTER_URL) ? window.ENV.API_REGISTER_URL : 'https://saas.diffsii.cl/api/public/register-client';
                
                const payload = {
                    userName: userData.name,
                    userEmail: userData.email,
                    name: userData.company, // Crucial: El backend espera 'name' como nombre de la empresa
                    companyName: userData.company,
                    companyRut: userData.rut,
                    planId: userData.plan,
                    plan: userData.plan, // El controlador evalúa 'plan'
                    email: userData.email,
                    rut: userData.rut,
                    address: userData.address,
                    comuna: userData.commune,    // el Backend usa 'comuna'
                    city: userData.city          // el Backend usa 'city'
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusText.style.display = 'none';
                    apiResponse.style.display = 'block';
                    
                    // Enviar evento de compra a GA4
                    if (typeof window.gtag === 'function') {
                        gtag('event', 'purchase', {
                            currency: 'CLP',
                            value: userData.amount,
                            items: [{
                                item_id: userData.plan,
                                item_name: 'Plan ' + userData.plan
                            }]
                        });
                    }

                    // Enviar email al login
                    const btnDashboard = document.getElementById('btn-dashboard');
                    if (btnDashboard && userData.email) {
                        let currentHref = btnDashboard.href;
                        btnDashboard.href = currentHref + (currentHref.includes('?') ? '&' : '?') + 'email=' + encodeURIComponent(userData.email);
                    }

                    // Limpiar datos tras éxito
                    localStorage.removeItem('pending_registration');
                } else {
                    const errorMsg = await response.json().catch(()=>({}));
                    statusText.innerHTML = `❌ Hubo un problema al registrar la compañía.<br><small style="color:#ef4444">${errorMsg.error || response.statusText || 'Error desconocido del servidor'}</small>`;
                }
            } catch (error) {
                console.error("Error API:", error);
                statusText.innerHTML = `❌ Error de red o CORS al crear tu instancia:<br><small style="color:#ef4444">${error.message}</small>`;
            }
        }

        // Ejecutar registro al cargar la página
        window.onload = () => {
            if (window.ENV) {
                const btnDashboard = document.getElementById('btn-dashboard');
                if (btnDashboard) {
                    btnDashboard.href = window.ENV.DASHBOARD_URL;
                }
            }
            registerSystem();
        };
    </script>
</body>

</html>
